name: evidence_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_app_check: ^0.3.2+10

  # HTTP calls to your backend
  http: ^1.2.0
  http_parser: ^4.0.2

  # File picking (evidence upload)
  file_picker: ^8.0.0

  # QR code generation (for each evidence)
  qr_flutter: ^4.1.0

  # QR code scanning
  mobile_scanner: ^5.0.0

  # Local storage (save token etc)
  shared_preferences: ^2.2.0

  # Image preview
  cached_network_image: ^3.3.0

  # Video preview
  video_player: ^2.8.3

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10

  # State management
  provider: ^6.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ── App Icon Config ────────────────────────────────────────────
# THIS MUST BE AT ROOT LEVEL — NOT inside dev_dependencies
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"

# ── Flutter Config ─────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/logo.png